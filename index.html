<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NatureShooter | Fotografia de Animais</title>
    <meta name="description" content="NatureShooter é o portfólio de fotografia de animais e natureza por Miguel Figueiredo. Explore imagens de macacos, girafas e paisagens naturais." />
    <meta name="keywords" content="NatureShooter, fotografia, animais, natureza, macacos, girafas, portfólio, Miguel Figueiredo" />
    <meta name="author" content="Miguel Figueiredo" />
    <meta name="google-site-verification" content="googleacfc2899a70cedc3" />
    <meta property="og:title" content="NatureShooter | Fotografia de Animais" />
    <meta property="og:description" content="NatureShooter é o portfólio de fotografia de animais e natureza por Miguel Figueiredo. Veja imagens de macacos, girafas e mais." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="fotos/IMG_3420.JPG" />
    <meta property="og:url" content="https://jg4432894-hue.github.io/NatureShooter/" />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar" aria-label="Navegação principal">
        <button class="menu-toggle" aria-expanded="false" aria-controls="sidebar-menu" aria-label="Abrir menu de navegação">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
            <ul>
                <li><a href="#inicio-slide">Início</a></li>
                <li><a href="#photos-slide">Fotos</a></li>
            </ul>
        </div>
    </nav>

    <main class="galeria" id="meu-album">
        <header class="cabecalho" id="inicio-slide">
            <h1>NatureShooter</h1>
            <p>A beleza da natureza e dos animais através da minha lente.</p>

            <div class="perfil-container">
                <img src="fotos/pfp.jpg" alt="Foto de perfil NatureShooter" class="perfil-foto">

                <a href="https://www.instagram.com/nature_shooter1/" target="_blank" rel="noopener" class="instagram-link" title="Visitar Instagram">
                    <svg class="instagram-logo" viewBox="0 0 512 512" aria-hidden="true">
                        <path d="M349.33 69.33a93.62 93.62 0 0 1 93.34 93.34v186.66a93.62 93.62 0 0 1-93.34 93.34H162.67a93.62 93.62 0 0 1-93.34-93.34V162.67a93.62 93.62 0 0 1 93.34-93.34h186.66m0-37.33H162.67C90.8 32 32 90.8 32 162.67v186.66C32 421.2 90.8 480 162.67 480h186.66C421.2 480 480 421.2 480 349.33V162.67C480 90.8 421.2 32 349.33 32z"/>
                        <path d="M256 138.67A117.33 117.33 0 1 0 373.33 256 117.46 117.46 0 0 0 256 138.67zm0 197.33A80 80 0 1 1 336 256a80.09 80.09 0 0 1-80 80z"/>
                        <circle cx="390.47" cy="121.53" r="27.02"/>
                    </svg>
                </a>
            </div>

            <p class="instrucao" id="texto-instrucao">Pressione Enter para ver mais</p>
        </header>

        <section class="obra photos-slide" id="photos-slide">
            <div class="gallery-container">
                <div class="photo-button-wrapper">
                    <button type="button" class="photo-button" aria-label="Ver foto: Macaco">
                        <img src="fotos/IMG_3420.JPG" alt="Macaco">
                    </button>
                    <button type="button" class="photo-button photo-button--offset-1" aria-label="Ver foto: Girafa">
                        <img src="fotos/IMG_3447.JPG" alt="Girafa">
                    </button>
                    <button type="button" class="photo-button photo-button--offset-2" aria-label="Ver foto: Natureza">
                        <img src="fotos/IMG_3460.JPG" alt="Natureza">
                    </button>
                </div>

                <h2 class="gallery-title">Galeria</h2>
                <div id="gallery-grid" class="gallery-grid" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Visualização de foto">
        <button class="lightbox-close" type="button" aria-label="Fechar">&times;</button>
        <button class="lightbox-prev" type="button" aria-label="Foto anterior">&#8249;</button>
        <button class="lightbox-next" type="button" aria-label="Próxima foto">&#8250;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <p id="lightbox-caption" class="lightbox-caption" hidden></p>
            <a id="lightbox-instagram" href="#" target="_blank" rel="noopener" class="lightbox-instagram-link">Ver no Instagram</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
